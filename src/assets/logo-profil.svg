<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 170" width="300" height="170">
  <defs>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e7b98a"/>
      <stop offset="55%" stop-color="#d8a46c" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#d8a46c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hz" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f3b47" stop-opacity="0"/>
      <stop offset="20%" stop-color="#0f3b47"/>
      <stop offset="80%" stop-color="#0f3b47"/>
      <stop offset="100%" stop-color="#0f3b47" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Sun rising behind -->
  <circle cx="150" cy="78" r="46" fill="url(#sun)"/>

  <!-- Water reflection (subtle) -->
  <g stroke="#2c7a8c" stroke-width="1.6" opacity=".28" stroke-linecap="round">
    <line x1="118" y1="126" x2="118" y2="132"/>
    <line x1="150" y1="127" x2="150" y2="134"/>
    <line x1="182" y1="126" x2="182" y2="132"/>
  </g>

  <!-- Chain Bridge -->
  <g fill="none" stroke="#0f3b47" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- deck -->
    <line x1="42" y1="114" x2="258" y2="114"/>
    <!-- main suspension cables -->
    <path d="M42,114 C74,114 84,72 110,66 C132,71 140,84 150,84 C160,84 168,71 190,66 C216,72 226,114 258,114"/>
    <!-- towers -->
    <path d="M99,114 L99,64 M121,114 L121,64" />
    <path d="M95,64 L125,64" stroke-width="3"/>
    <path d="M104,64 Q110,54 116,64" stroke-width="1.8"/>
    <path d="M179,114 L179,64 M201,114 L201,64"/>
    <path d="M175,64 L205,64" stroke-width="3"/>
    <path d="M184,64 Q190,54 196,64" stroke-width="1.8"/>
    <!-- hangers -->
    <g stroke-width="1.2" opacity=".8">
      <line x1="66" y1="97" x2="66" y2="114"/>
      <line x1="82" y1="82" x2="82" y2="114"/>
      <line x1="136" y1="80" x2="136" y2="114"/>
      <line x1="150" y1="84" x2="150" y2="114"/>
      <line x1="164" y1="80" x2="164" y2="114"/>
      <line x1="218" y1="82" x2="218" y2="114"/>
      <line x1="234" y1="97" x2="234" y2="114"/>
    </g>
  </g>

  <!-- Horizon line -->
  <line x1="20" y1="126" x2="280" y2="126" stroke="url(#hz)" stroke-width="2.2" stroke-linecap="round"/>
</svg>
